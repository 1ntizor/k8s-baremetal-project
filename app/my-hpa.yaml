apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-deployment # Имя из твоего 'kubectl get deployments'
  minReplicas: 2           # Минимум 2 пода
  maxReplicas: 10          # Максимум 10 подов
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50 # Порог нагрузки в 50%
